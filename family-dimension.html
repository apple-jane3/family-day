<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Family Day Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
  <style>
    :root{--brown:#5d3527;--deep:#3e2119;--pink:#f7c8d4;--cream:#fffaf6;--rose:#c57489}*{box-sizing:border-box}body{margin:0;background:var(--pink);font-family:"DM Sans",sans-serif;color:var(--brown)}
    .page{width:min(1060px,calc(100% - 32px));margin:16px auto;min-height:calc(100vh - 32px);padding:29px 7% 48px;background:var(--cream);border-radius:30px;position:relative;overflow:hidden}.bubble{position:absolute;width:290px;height:290px;border-radius:50%;background:#f7dce2;right:-130px;top:-120px}nav,main{position:relative;z-index:1}nav{display:flex;justify-content:space-between;align-items:center}.logo{color:var(--brown);text-decoration:none;font:800 21px "Playfair Display",serif}.logo span{color:#d98a9d;font-style:italic}.back{color:#fff;background:var(--brown);text-decoration:none;padding:12px 18px;border-radius:99px;font-size:13px;font-weight:700;box-shadow:0 4px #3b1d15}
    .eyebrow{display:inline-block;margin-top:58px;padding:8px 12px;border:1px solid #e9b9c5;border-radius:99px;background:#fff7f8;font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}.layout{display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:54px;padding:18px 0 42px}h1{font:800 clamp(3.2rem,7vw,5.8rem)/.91 "Playfair Display",serif;letter-spacing:-.065em;color:var(--deep);margin:0 0 17px}h1 em{color:#c96f85;font-style:italic}.description{font-size:16px;line-height:1.7;color:#805f56;margin:0}.photo{min-height:365px;border-radius:40% 60% 53% 47% / 46% 45% 55% 54%;background:center/cover no-repeat;box-shadow:inset 0 0 0 10px #fae9eb}.info{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.info-card{background:#fff;border:1px solid #efd6d9;border-radius:18px;padding:18px}.info-card b{display:block;color:var(--rose);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}.info-card span{font:700 17px "Playfair Display",serif;color:var(--deep);line-height:1.25}.choose{margin-top:33px;padding:19px 21px;background:#fff5f6;border-radius:19px;font-size:13px;font-weight:600}.choose a{color:var(--brown);text-decoration:none;margin-left:13px}.choose a:hover{color:#c57489}@media(max-width:700px){.page{width:calc(100% - 20px);margin:10px auto;padding:23px 24px 35px;border-radius:22px}.eyebrow{margin-top:48px}.layout,.info{grid-template-columns:1fr}.layout{gap:29px;padding-bottom:35px}.photo{min-height:285px}.choose a{display:inline-block;margin:10px 11px 0 0}}
  </style>
</head>
<body>
  <div class="page"><div class="bubble"></div>
    <nav><a class="logo" href="index.html">family <span>day</span> 2026</a><a class="back" href="details.html">← Details</a></nav>
    <main>
      <span class="eyebrow" id="eyebrow">♡ Family Day details</span>
      <section class="layout"><div><h1 id="title">Make the day <em>yours.</em></h1><p class="description" id="description">Choose a card from the details page to discover what is waiting for your family.</p></div><div class="photo" id="photo" role="img"></div></section>
      <section class="info" id="info"></section>
      <div class="choose">Explore another detail: <a href="#when">When</a><a href="#where">Where</a><a href="#bring">What to bring</a><a href="#memories">Make memories</a></div>
    </main>
  </div>
  <script>
    const views={
      when:{eyebrow:'♡ When to join us',title:'A full day of <em>family joy.</em>',description:'Family Day begins with a warm welcome and continues with games, creativity, food, and plenty of time to be together. Come early so you do not miss the opening smiles.',photo:'https://images.unsplash.com/photo-1504150558240-0b4fd8946624?auto=format&fit=crop&w=1000&q=85',alt:'A happy family enjoying time together',cards:[['Date','Family Day 2026'],['Time','9:00 AM – 2:00 PM'],['Best arrival','8:45 AM for check-in']]},
      where:{eyebrow:'♡ Where we gather',title:'Meet us in the <em>garden.</em>',description:'Our celebration takes place at Community Garden Celebration Hall: a friendly, comfortable space with room for every generation to relax, play, and connect.',photo:'https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=1000&q=85',alt:'Family enjoying an outdoor gathering',cards:[['Venue','Community Garden'],['Main space','Celebration Hall'],['Look for','Pink Family Day welcome sign']]},
      bring:{eyebrow:'♡ What to bring',title:'Bring your <em>whole heart.</em>',description:'The most important thing is simply being together. Wear something comfortable for games and bring your loved ones ready for laughter, hugs, and a few joyful surprises.',photo:'https://images.unsplash.com/photo-1516627145497-ae6968895b74?auto=format&fit=crop&w=1000&q=85',alt:'A family spending a warm moment together',cards:[['Bring','Your loved ones'],['Wear','Comfortable clothes'],['Remember','A happy heart']]},
      memories:{eyebrow:'♡ Moments to remember',title:'Make memories <em>together.</em>',description:'From team games to the group photo, every activity is designed to create a little more laughter and a memory your family can carry home.',photo:'https://images.unsplash.com/photo-1489710437720-ebb67ec84dd2?auto=format&fit=crop&w=1000&q=85',alt:'People having fun together at a celebration',cards:[['Play','Family fun games'],['Create','A keepsake craft'],['Capture','Our group photo']]}
    };
    function render(){const key=location.hash.slice(1)||'when',v=views[key]||views.when;eyebrow.textContent=v.eyebrow;title.innerHTML=v.title;description.textContent=v.description;photo.style.backgroundImage=`linear-gradient(#f7c8d433,#f7c8d433),url('${v.photo}')`;photo.setAttribute('aria-label',v.alt);info.innerHTML=v.cards.map(c=>`<article class="info-card"><b>${c[0]}</b><span>${c[1]}</span></article>`).join('')};addEventListener('hashchange',render);render();
  </script>
</body>
</html>
